name: Update Roblox game stats

on:
  schedule:
    # Runs once a day at 06:00 UTC. Edit the cron expression to change timing.
    - cron: '0 6 * * *'
  workflow_dispatch: {} # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch latest Roblox stats
        run: node scripts/fetch-roblox-stats.mjs

      - name: Commit updated stats (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/game-stats.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: refresh Roblox game stats"
            git push
          fi
